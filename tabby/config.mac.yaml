appearance:
  theme: Follow the OS
  opacity: 1
  vibrancy: false
  css: |
    /* Gradient border with rounded corners
       Uses background-clip trick since border-image doesn't support border-radius */
    app-root {
      border-radius: 12px !important;
      border: 2px solid transparent !important;
      background: linear-gradient(#1E1F29, #1E1F29) padding-box,
                  linear-gradient(180deg, #D4F442, #02F758) border-box !important;
      box-sizing: border-box;
    }

    /* Tab bar styling (matching hyper-bloody) */
    .tab-bar {
      background-color: #1E1F29 !important;
    }
    .tab-bar .tab .label {
      color: #555753;
    }
    .tab-bar .tab.active .label {
      color: #AAAAAA;
      border-bottom: 2px solid #ED3A53;
    }
  spaciness: 1.1
terminal:
  fontSize: 19
  font: FiraCode Nerd Font
  fontFamily: '''FiraCode Nerd Font'', ''Courier'''
  cursorShape: bar
  cursorBlink: true
  scrollbackLines: 60000
  copyOnSelect: true
  searchOptions: {}
  colorScheme:
    name: hyper-bloody
    foreground: '#AAAAAA'
    background: '#1E1F29'
    cursor: '#DD2476'
    selection: rgba(221, 36, 118, 0.3)
    colors:
      - '#1E1F29'
      - '#FF512F'
      - '#B2FFA9'
      - '#FFFD82'
      - '#3185FC'
      - '#DD2476'
      - '#66D7D1'
      - '#F2EFEA'
      - '#555753'
      - '#FF512F'
      - '#B2FFA9'
      - '#FFFD82'
      - '#3185FC'
      - '#DD2476'
      - '#66D7D1'
      - '#F2EFEA'
  cursor: beam
  fallbackFont: Courier New
  bell: audible
  shell: /bin/zsh
window:
  quake: false
version: 8
hotkeys:
  toggle-window:
